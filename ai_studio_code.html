<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personas Poderosas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .dimension-card { transition: all 0.3s ease; }
        .dimension-card:hover { transform: translateY(-5px); }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- PANTALLA 1: AUTORIZACIÓN -->
    <div id="screen-auth" class="flex flex-col items-center justify-center h-screen p-6">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center border border-gray-100">
            <h1 class="text-3xl font-black text-indigo-900 mb-2">Personas Poderosas</h1>
            <p class="text-gray-500 mb-8 text-sm">Desarrollo Personal Integral</p>
            <div class="text-left">
                <label class="block mb-2 text-xs font-bold text-gray-400 uppercase tracking-widest">Código de Autorización</label>
                <input type="password" id="auth-code" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl mb-4 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="••••••••">
                <button onclick="checkAuth()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-200 transition-all">Ingresar</button>
                <p id="auth-error" class="text-red-500 text-sm mt-4 hidden text-center font-medium">Código incorrecto. Intente de nuevo.</p>
            </div>
        </div>
    </div>

    <!-- PANTALLA 2: IDENTIFICACIÓN -->
    <div id="screen-login" class="hidden flex flex-col items-center justify-center h-screen p-6">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center border border-gray-100">
            <div class="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Bienvenido</h2>
            <p class="mb-8 text-gray-500">Ingresa tu nombre para personalizar tu experiencia</p>
            <input type="text" id="user-name" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl mb-6 focus:ring-2 focus:ring-green-500 outline-none transition-all" placeholder="Tu nombre completo">
            <button onclick="registerUser()" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-bold shadow-lg shadow-green-200 transition-all">Comenzar</button>
        </div>
    </div>

    <!-- PANTALLA 3: DASHBOARD PRINCIPAL -->
    <div id="screen-main" class="hidden p-6 max-w-lg mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <p class="text-gray-500 text-sm">Panel de Control</p>
                <h2 class="text-2xl font-black text-gray-800">Hola, <span id="display-name" class="text-indigo-600"></span></h2>
            </div>
            <button onclick="showAdmin()" class="bg-white p-3 rounded-xl shadow-sm border border-gray-100">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                </svg>
            </button>
        </header>

        <div class="grid grid-cols-2 gap-4" id="dimensions-grid">
            <!-- Dinámico -->
        </div>
    </div>

    <!-- PANTALLA 4: DETALLE DE DIMENSIÓN -->
    <div id="screen-detail" class="hidden p-6 max-w-lg mx-auto">
        <div class="flex items-center mb-6">
            <button onclick="showMain()" class="mr-4 p-2 bg-white rounded-lg shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <h2 id="detail-title" class="text-2xl font-black text-gray-800 uppercase tracking-tight"></h2>
        </div>
        
        <div id="areas-container" class="space-y-6 pb-12">
            <!-- Áreas y Actividades Dinámicas -->
        </div>
    </div>

    <!-- PANEL ADMIN -->
    <div id="screen-admin" class="hidden p-6 max-w-lg mx-auto">
        <button onclick="showMain()" class="mb-6 font-bold text-indigo-600 flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7 7-7" />
            </svg> Volver al inicio
        </button>
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Administrador de Usuarios</h2>
        <div id="user-list" class="space-y-3"></div>
    </div>

    <script>
        const CONFIG = {
            "Personal": { color: "blue", icon: "👤", areas: { "SALUD": ["Revisión médica", "Análisis de laboratorio", "Revisión dental"], "EJERCICIO": ["Caminata", "Gimnasio", "Dormir 8 horas"], "ALIMENTACIÓN": ["Comida saludable", "Reducir refresco", "Comer en casa"], "LECTURA": ["Desarrollo personal", "Desarrollo profesional", "Desarrollo de habilidades"] } },
            "Familiar": { color: "orange", icon: "🏠", areas: { "CONVIVENCIA": ["Con la familia", "Con la pareja", "Con los hijos"], "ESCUCHA": ["Con la pareja", "Con los hijos", "Con amigos"], "PAREJA": ["Salidas solos", "Salidas con amigos", "Escucha activa"], "ELOGIOS": ["Pareja", "Familia", "Amigos"] } },
            "Social": { color: "green", icon: "🤝", areas: { "CONVIVENCIA": ["Salidas grupales", "Clubes o agrupaciones", "Actividades recreativas"], "FILANTROPÍA": ["Buscar grupo", "Participación activa", "Donaciones"], "RELACIONES": ["Seleccionar amistades", "Frecuentar gente nutricia", "Buscar mentor"], "OTRO": ["Actividad 1", "Actividad 2", "Actividad 3"] } },
            "Laboral": { color: "slate", icon: "💼", areas: { "CAPACITACIÓN": ["Cursos", "Conferencias", "Autoaprendizaje"], "PROYECTOS": ["Desarrollo", "Implementación", "Impacto"], "PRODUCTIVIDAD": ["Puntualidad", "Eficacia", "Trabajo enfocado"], "TIEMPOS": ["Eficiencia", "Entregas a tiempo", "Agenda diaria"] } },
            "Económica": { color: "yellow", icon: "💰", areas: { "CONTROL DE GASTOS": ["Listado de gastos", "Programación de pagos", "Disminución de deuda"], "AHORRO": ["Dinero mensual", "Inversión", "Otro"], "PREVISIÓN": ["Pensión", "Seguro de vida", "Seguro de gastos médicos"], "INGRESO": ["Ventas", "Horas extra", "Trabajos extraordinarios"] } },
            "Espiritual": { color: "purple", icon: "✨", areas: { "EVANGELIO": ["Lectura diaria", "Curso de biblia", "Otro"], "MISA": ["Conocer sobre la Misa", "Misa dominical", "Confesión y comunión"], "GRUPO": ["Sumarse", "Apoyar", "Otro"], "APOSTOLADO": ["Sumarse", "Apoyar", "Otro"] } }
        };

        const COLOR_MAP = {
            blue: "border-blue-500 text-blue-600 bg-blue-50",
            orange: "border-orange-500 text-orange-600 bg-orange-50",
            green: "border-green-500 text-green-600 bg-green-50",
            slate: "border-slate-500 text-slate-600 bg-slate-50",
            yellow: "border-yellow-500 text-yellow-600 bg-yellow-50",
            purple: "border-purple-500 text-purple-600 bg-purple-50"
        };

        let currentUser = null;
        let userData = {};

        function checkAuth() {
            if (document.getElementById('auth-code').value === "Proser18") {
                showScreen('screen-login');
            } else {
                document.getElementById('auth-error').classList.remove('hidden');
            }
        }

        function registerUser() {
            const name = document.getElementById('user-name').value.trim();
            if (name) {
                currentUser = name;
                document.getElementById('display-name').innerText = name;
                
                let users = JSON.parse(localStorage.getItem('pp_users') || '[]');
                if(!users.includes(name)) users.push(name);
                localStorage.setItem('pp_users', JSON.stringify(users));
                
                const savedData = localStorage.getItem('data_' + name);
                userData = savedData ? JSON.parse(savedData) : JSON.parse(JSON.stringify(CONFIG));
                
                renderDashboard();
                showScreen('screen-main');
            }
        }

        function renderDashboard() {
            const grid = document.getElementById('dimensions-grid');
            grid.innerHTML = '';
            Object.keys(CONFIG).forEach(dim => {
                const info = CONFIG[dim];
                const classes = COLOR_MAP[info.color];
                grid.innerHTML += `
                    <div onclick="openDimension('${dim}')" class="dimension-card bg-white p-6 rounded-3xl shadow-sm border-b-4 ${classes.split(' ')[0]} cursor-pointer">
                        <div class="text-3xl mb-3">${info.icon}</div>
                        <div class="font-bold text-gray-800 text-sm uppercase tracking-wider">${dim}</div>
                    </div>`;
            });
        }

        function openDimension(dim) {
            showScreen('screen-detail');
            document.getElementById('detail-title').innerText = dim;
            const container = document.getElementById('areas-container');
            container.innerHTML = '';

            const areas = userData[dim].areas;
            Object.keys(areas).forEach(area => {
                let html = `<div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                    <input onchange="saveAreaName('${dim}','${area}', this.value)" class="font-black text-gray-400 text-xs tracking-widest uppercase mb-4 w-full bg-transparent outline-none focus:text-indigo-600" value="${area}">`;
                
                areas[area].forEach((act, idx) => {
                    const id = `${currentUser}_${dim}_${area}_${idx}`;
                    const goal = localStorage.getItem(id + '_goal') || 0;
                    const prog = localStorage.getItem(id + '_prog') || 0;
                    const perc = goal > 0 ? Math.min((prog / goal) * 100, 100) : 0;

                    html += `
                        <div class="mb-6 last:mb-2">
                            <input onchange="saveActName('${dim}','${area}',${idx}, this.value)" class="w-full font-bold text-gray-700 mb-2 outline-none focus:text-indigo-600" value="${act}">
                            <div class="flex items-center gap-3 mb-2">
                                <div class="flex-1 bg-gray-100 h-3 rounded-full overflow-hidden">
                                    <div class="bg-indigo-500 h-full transition-all duration-500" style="width: ${perc}%"></div>
                                </div>
                                <span class="text-xs font-black text-indigo-600 w-8">${Math.round(perc)}%</span>
                            </div>
                            <div class="flex gap-3">
                                <div class="flex-1">
                                    <label class="block text-[10px] uppercase font-bold text-gray-400 mb-1">Meta</label>
                                    <input type="number" onchange="saveVal('${id}_goal', this.value)" value="${goal}" class="w-full p-2 bg-gray-50 border border-gray-100 rounded-xl text-sm outline-none focus:ring-1 focus:ring-indigo-400">
                                </div>
                                <div class="flex-1">
                                    <label class="block text-[10px] uppercase font-bold text-gray-400 mb-1">Avance</label>
                                    <input type="number" onchange="saveVal('${id}_prog', this.value)" value="${prog}" class="w-full p-2 bg-gray-50 border border-gray-100 rounded-xl text-sm outline-none focus:ring-1 focus:ring-indigo-400">
                                </div>
                            </div>
                        </div>`;
                });
                html += `</div>`;
                container.innerHTML += html;
            });
        }

        function saveAreaName(dim, oldArea, newArea) {
            const data = userData[dim].areas;
            data[newArea.toUpperCase()] = data[oldArea];
            if (oldArea !== newArea.toUpperCase()) delete data[oldArea];
            sync();
        }

        function saveActName(dim, area, idx, val) {
            userData[dim].areas[area][idx] = val;
            sync();
        }

        function saveVal(id, val) {
            localStorage.setItem(id, val);
            openDimension(document.getElementById('detail-title').innerText);
        }

        function sync() {
            localStorage.setItem('data_' + currentUser, JSON.stringify(userData));
        }

        function showScreen(id) {
            document.querySelectorAll('[id^="screen-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function showMain() { showScreen('screen-main'); renderDashboard(); }

        function showAdmin() {
            showScreen('screen-admin');
            const list = document.getElementById('user-list');
            const users = JSON.parse(localStorage.getItem('pp_users') || '[]');
            list.innerHTML = users.length ? users.map(u => `
                <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <span class="font-bold text-gray-700">${u}</span>
                    <button onclick="deleteUser('${u}')" class="text-red-500 p-2 hover:bg-red-50 rounded-lg transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>
            `).join('') : '<p class="text-gray-400 text-center py-8">No hay usuarios registrados.</p>';
        }

        function deleteUser(name) {
            if(confirm(`¿Eliminar permanentemente a ${name}?`)) {
                let users = JSON.parse(localStorage.getItem('pp_users') || '[]').filter(u => u !== name);
                localStorage.setItem('pp_users', JSON.stringify(users));
                localStorage.removeItem('data_' + name);
                // Limpiar llaves de progreso del usuario
                Object.keys(localStorage).forEach(key => {
                    if(key.startsWith(name + '_')) localStorage.removeItem(key);
                });
                showAdmin();
            }
        }
    </script>
</body>
</html>
